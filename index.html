<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عزام المعيي | الموقع الرسمي</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.2);
            --border-hover: rgba(255, 255, 255, 0.6);
            --text: #ffffff;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 15px;
        }

        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0f0f0f 0%, #000000 100%);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }

        header h1 {
            font-size: clamp(2.8rem, 10vw, 4.2rem);
            font-weight: 900;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: linear-gradient(180deg, #ffffff 50%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .contact-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 35px;
            border-radius: 100px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            width: fit-content;
            margin: 0 auto;
        }

        .contact-bar a, .contact-bar div {
            color: #fff;
            font-size: 1.4rem;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .bento-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            backdrop-filter: blur(30px);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .bento-card:hover:not(.static) {
            transform: scale(1.03) translateY(-8px);
            border-color: var(--border-hover);
            background: var(--card-hover);
        }

        .bento-card i { font-size: 2.8rem; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .bento-card span { font-size: 1.2rem; font-weight: 800; }

        .static { cursor: default; }
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 15px;
            width: 100%;
            margin-top: 25px;
            pointer-events: none;
        }
        .tech-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .tech-item img { 
            width: 42px; height: 42px; object-fit: contain; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }
        .tech-item span { font-size: 0.8rem; font-weight: 600; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            padding: 40px 20px;
            overflow-y: auto;
            backdrop-filter: blur(30px);
        }
        .modal-content { max-width: 550px; margin: 0 auto; }
        .close-btn {
            background: #fff; border: none; color: #000; padding: 12px 35px;
            border-radius: 100px; margin-bottom: 30px; cursor: pointer; font-weight: 800;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px; border-radius: 30px; margin-bottom: 20px;
        }

        /* Simulator */
        #sim-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 5000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .iphone-device {
            width: 320px; height: 680px; background: #000; border-radius: 50px;
            border: 8px solid #333; position: relative; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
        }
        .iphone-screen {
            height: 100%; padding: 60px 20px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop') center/cover;
            display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: min-content; gap: 20px;
        }
        .app-layer {
            position: absolute; inset: 0; background: #fff; z-index: 400;
            display: none; flex-direction: column;
        }
        .app-iframe { width: 100%; flex: 1; border: none; }
        .home-indicator {
            width: 120px; height: 5px; background: #000; border-radius: 10px;
            margin: 10px auto; cursor: pointer;
        }
        .app-icon-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s;
        }
        .app-icon-wrapper:active { transform: scale(0.9); }
        .app-icon {
            width: 55px; height: 55px; border-radius: 12px; background: #fff; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-name { font-size: 0.65rem; color: #fff; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <header>
        <h1>عزام المعيي</h1>
        <div class="contact-bar">
            <a href="mailto:azamred3@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <div onclick="openM('cv')"><i class="fa-solid fa-file-invoice"></i></div>
            <a href="https://wa.me/966503337182" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://linkedin.com/in/azam-al-moee" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="bento-card" style="grid-column: span 2;" onclick="openM('about')">
            <i class="fa-solid fa-user-astronaut"></i>
            <span>الهدف المهني والنبذة</span>
        </div>

        <div class="bento-card" style="grid-column: span 2;" onclick="openM('projects')">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>الأعمال والمشاريع</span>
        </div>

        <div class="bento-card static" style="grid-column: span 2;">
            <span style="margin-bottom: 10px;">لغات البرمجة والتقنيات</span>
            <div class="tech-grid">
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"><span>HTML5</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg"><span>CSS3</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"><span>JS</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg"><span>Python</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg"><span>C++</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg"><span>PHP</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kotlin/kotlin-original.svg"><span>Kotlin</span></div>
                <div class="tech-item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/swift/swift-original.svg"><span>Swift</span></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeM()">إغلاق</button>
            <h2 id="mT" style="font-size: 2.2rem; margin-bottom: 25px; font-family: 'IBM Plex Sans Arabic';"></h2>
            <div id="mB"></div>
        </div>
    </div>

    <!-- Simulator -->
    <div id="sim-overlay">
        <div class="iphone-device">
            <div class="iphone-screen">
                <!-- App 1 -->
                <div class="app-icon-wrapper" onclick="openApp('RouterSpeed.html')">
                    <div class="app-icon">
                        <img src="ROUTERSPEED.png">
                    </div>
                    <span class="app-name">Router Speed</span>
                </div>

                <!-- New App: Aslam -->
                <div class="app-icon-wrapper" onclick="openApp('aslam.HTML')">
                    <div class="app-icon" style="background: #1a1a1a;">
                        <i class="fa-solid fa-mosque" style="color: #fff; font-size: 1.5rem;"></i>
                    </div>
                    <span class="app-name">منظم ديني</span>
                </div>
            </div>

            <div class="app-layer" id="appLayer">
                <iframe id="appIframe" class="app-iframe"></iframe>
                <div class="home-indicator" onclick="closeApp()"></div>
            </div>
        </div>
        <button class="close-btn" style="margin-top: 30px; background: transparent; color: #fff; border: 1px solid #fff;" onclick="exitSim()">خروج من المحاكاة</button>
    </div>

    <script>
        const data = {
            about: {
                t: "النبذة والهدف",
                b: `<div class="item-card"><h3>رؤيتي</h3><p>أسعى لدمج الإبداع الفني مع الكفاءة التقنية.</p></div>`
            },
            projects: {
                t: "الأعمال والمشاريع",
                b: `<div class="item-card"><h3>محاكاة النظام</h3><p>تجربة حية للأنظمة التي أقوم ببنائها.</p><button class="close-btn" style="width: 100%; margin-top: 20px;" onclick="launchSim()">تشغيل المحاكي</button></div>`
            },
            cv: {
                t: "السيرة الذاتية",
                b: `<div class="item-card"><h3>تحميل الملف</h3><button class="close-btn" style="width: 100%;">تحميل PDF</button></div>`
            }
        };

        function openM(key) {
            document.getElementById('mT').innerText = data[key].t;
            document.getElementById('mB').innerHTML = data[key].b;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function closeM() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        
        function launchSim() { closeM(); document.getElementById('sim-overlay').style.display = 'flex'; }
        function exitSim() { document.getElementById('sim-overlay').style.display = 'none'; }
        
        function openApp(url) {
            const layer = document.getElementById('appLayer');
            const iframe = document.getElementById('appIframe');
            iframe.src = url;
            layer.style.display = 'flex';
            gsap.fromTo(layer, {y: '100%'}, {y: '0%', duration: 0.4, ease: "power2.out"});
        }
        
        function closeApp() {
            const layer = document.getElementById('appLayer');
            gsap.to(layer, {y: '100%', duration: 0.3, ease: "power2.in", onComplete: () => {
                layer.style.display = 'none';
                document.getElementById('appIframe').src = "";
            }});
        }
    </script>
</body>
</html>
