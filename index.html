<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عزام المعيي | الموقع الرسمي</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- GSAP for Ultra-Smooth & Fast Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
            --border-hover: rgba(255, 255, 255, 0.5);
            --text: #ffffff;
            --text-dim: #c0c0c8;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 15px;
        }

        /* ---------------- Background ---------------- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000000 100%);
        }

        .glow-sphere {
            position: absolute;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            top: -15%;
            right: -10%;
            filter: blur(80px);
            pointer-events: none;
        }

        /* ---------------- Header ---------------- */
        header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
            opacity: 0;
            transform: translateY(-15px);
        }

        header h1 {
            font-size: clamp(2.8rem, 10vw, 4.2rem);
            font-weight: 900;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: linear-gradient(180deg, #ffffff 40%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .contact-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            background: rgba(255, 255, 255, 0.07);
            padding: 18px 40px;
            border-radius: 100px;
            border: 1px solid var(--border);
            backdrop-filter: blur(40px);
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .contact-bar a, .contact-bar div { 
            color: var(--text-dim); 
            font-size: 1.5rem; 
            transition: 0.25s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            cursor: pointer;
        }
        .contact-bar a:hover, .contact-bar div:hover { color: #fff; transform: scale(1.3); }

        /* ---------------- Bento Grid ---------------- */
        #main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding-bottom: 80px;
        }

        .bento-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            backdrop-filter: blur(50px);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
        }

        .bento-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--border-hover);
            background: var(--card-hover);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }

        .bento-card i { font-size: 2.8rem; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .bento-card span { font-size: 1.2rem; font-weight: 800; color: #fff; text-align: center; }

        .tech-box { grid-column: span 2; }
        
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px 15px;
            width: 100%;
            margin-top: 35px;
        }
        
        .tech-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .tech-item img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); transition: 0.3s; }
        .tech-item span { font-size: 0.9rem; color: var(--text-dim); font-weight: 700; }

        /* ---------------- Modal System ---------------- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            padding: 60px 20px;
            overflow-y: auto;
            backdrop-filter: blur(70px);
        }

        .modal-content { max-width: 550px; margin: 0 auto; }
        
        .close-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 35px;
            border-radius: 100px;
            margin-bottom: 40px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        .close-btn:hover { background: #fff; color: #000; }

        .modal h2 { 
            font-size: 2.6rem; 
            margin-bottom: 40px; 
            border-right: 12px solid #fff; 
            padding-right: 25px; 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
        }

        .item-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 15px;
            transition: 0.3s ease;
        }

        .launch-btn {
            background: linear-gradient(45deg, #fff, #ddd);
            color: #000;
            padding: 18px 50px;
            border-radius: 100px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            margin-top: 30px;
            width: 100%;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        /* ---------------- iPhone Simulation UI ---------------- */
        #iphone-environment {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }

        .iphone-device {
            width: 340px;
            height: 690px;
            background: #000;
            border-radius: 55px;
            box-shadow: 0 0 0 12px #222, 0 30px 60px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at top right, #1a0033 0%, #000000 70%);
        }

        .dynamic-island {
            width: 120px;
            height: 35px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .iphone-status-bar {
            width: 100%;
            padding: 22px 25px 0;
            display: flex;
            justify-content: space-between;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            color: white;
            z-index: 50;
        }

        .iphone-screen-content {
            flex: 1;
            padding: 80px 20px 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: min-content;
            gap: 20px 15px;
        }

        /* App Icon Style */
        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* لقص الصورة داخل الأيقونة */
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        /* حقل الصورة للأيقونة */
        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-icon i { font-size: 1.8rem; color: white; }

        .app-icon-wrapper span { 
            font-size: 0.7rem; 
            color: #fff; 
            text-align: center;
            white-space: nowrap;
        }

        /* Opened App Overlay */
        .app-opened-view {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 200;
            transform: translateY(100%);
            display: flex;
            flex-direction: column;
        }

        .app-iframe {
            width: 100%;
            flex: 1;
            border: none;
        }

        .home-indicator-app {
            width: 130px;
            height: 5px;
            background: #000;
            border-radius: 5px;
            margin: 10px auto;
        }

        .exit-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 12px 30px;
            border-radius: 100px;
            cursor: pointer;
            border: 1px solid var(--border);
            font-family: 'Cairo', sans-serif;
        }

    </style>
</head>
<body>

    <div class="bg-canvas">
        <div class="glow-sphere"></div>
    </div>

    <div id="main-content">
        <header id="mainHeader">
            <h1>عزام المعيي</h1>
            <div class="contact-bar">
                <a href="mailto:azamred3@gmail.com"><i class="fa-solid fa-envelope"></i></a>
                <div onclick="openM('cv')"><i class="fa-solid fa-file-invoice"></i></div>
                <a href="https://wa.me/966503337182" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>
        </header>

        <div class="container">
            <div class="bento-card" style="grid-column: span 2;" onclick="openM('about')">
                <i class="fa-solid fa-user-astronaut"></i>
                <span>الهدف المهني والنبذة</span>
            </div>
            <div class="bento-card" onclick="openM('work')">
                <i class="fa-solid fa-briefcase"></i>
                <span>الخبرات العملية</span>
            </div>
            <div class="bento-card" onclick="openM('projects')">
                <i class="fa-solid fa-code-merge"></i>
                <span>الأعمال والمشاريع</span>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeM()">إغلاق</button>
            <h2 id="mT"></h2>
            <div id="mB"></div>
        </div>
    </div>

    <!-- iPhone Environment -->
    <div id="iphone-environment">
        <div class="iphone-device" id="iphone-device">
            <div class="dynamic-island"></div>
            <div class="iphone-status-bar">
                <span>12:45</span>
                <span><i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
            </div>
            
            <div class="iphone-screen-content">
                
                <!-- التطبيق الأول: Router Speed -->
                <div class="app-icon-wrapper" onclick="openApp('RouterSpeed.html')">
                    <div class="app-icon">
                        <!-- ضع رابط أيقونة تطبيق Router Speed هنا -->
                        <!--  -->
                        <img src="IMG/ROUTERSPEED.png" alt="RouterSpeed">
                    </div>
                    <span>Router Speed</span>
                </div>

                <!-- تطبيق إضافي كمثال -->
                <div class="app-icon-wrapper" onclick="alert('تطبيق تجريبي قادم')">
                    <div class="app-icon" style="background: linear-gradient(135deg, #FF3B30, #FF9500);">
                        <i class="fa-solid fa-fire"></i>
                    </div>
                    <span>مشروع 2</span>
                </div>

            </div>

            <!-- Opened App Area -->
            <div class="app-opened-view" id="app-view">
                <iframe id="app-iframe" class="app-iframe" src=""></iframe>
                <div style="cursor:pointer" onclick="closeApp()">
                    <div class="home-indicator-app"></div>
                </div>
            </div>
        </div>
        <button class="exit-btn" onclick="exitIphoneMode()">خروج من المحاكاة</button>
    </div>

    <script>
        const data = {
            about: { t: "النبذة والهدف", b: `<div class="item-card"><h3>الهدف</h3><p>بناء تجارب رقمية لا تُنسى.</p></div>` },
            work: { t: "الخبرات", b: `<div class="item-card"><h3>مطور ويب</h3><p>خبرة في حلول الربط البرمجي.</p></div>` },
            projects: {
                t: "الأعمال الذكية",
                b: `
                <div style="text-align:center;">
                    <p>هذه الأعمال هي محاكاة تفاعلية لتصاميمي داخل بيئة آيفون.</p>
                    <button class="launch-btn" onclick="startIphoneSimulation()">انطلق للمحاكاة 🚀</button>
                </div>`
            },
            cv: { t: "CV", b: `<p>تحميل السيرة الذاتية لعام 2024.</p>` }
        };

        function openM(key) {
            document.getElementById('mT').innerText = data[key].t;
            document.getElementById('mB').innerHTML = data[key].b;
            document.getElementById('modal').style.display = 'block';
            gsap.fromTo(".modal-content", { opacity: 0, y: 20 }, { opacity: 1, y: 0 });
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function startIphoneSimulation() {
            closeM();
            gsap.to("#main-content", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('iphone-environment').style.display = 'flex';
                gsap.fromTo("#iphone-device", { y: 500, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "back.out" });
            }});
        }

        function exitIphoneMode() {
            document.getElementById('iphone-environment').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            gsap.to("#main-content", { opacity: 1 });
        }

        function openApp(url) {
            document.getElementById('app-iframe').src = url;
            gsap.to("#app-view", { y: "0%", duration: 0.5, ease: "power4.out" });
        }

        function closeApp() {
            gsap.to("#app-view", { y: "100%", duration: 0.4, onComplete: () => {
                document.getElementById('app-iframe').src = "";
            }});
        }

        window.onload = () => {
            gsap.to("header", { opacity: 1, y: 0, duration: 0.8 });
            gsap.to(".bento-card", { opacity: 1, y: 0, stagger: 0.2 });
        };
    </script>
</body>
</html>
